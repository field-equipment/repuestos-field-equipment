<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stock Repuestos – Field Equipment LAS</title>
<style>
  :root{--green:#3B7A2E;--green-light:#5a9e4a;--green-bg:#f0f7ee;--text:#222;--shadow:0 2px 10px rgba(0,0,0,.10)}
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Segoe UI',Arial,sans-serif;background:#e8f0e5;color:var(--text)}
  header{background:var(--green);color:white;padding:18px 32px;display:flex;align-items:center;gap:18px;box-shadow:var(--shadow)}
  .logo{font-size:28px;font-weight:800;letter-spacing:2px}
  .subtitle{font-size:14px;opacity:.85;margin-top:3px}
  .updated{font-size:11px;opacity:.7;margin-top:2px}
  .badge{margin-left:auto;background:rgba(255,255,255,.18);border-radius:20px;padding:6px 18px;font-size:13px;font-weight:600}
  .filters-bar{background:white;padding:18px 32px;display:flex;flex-wrap:wrap;gap:14px;align-items:flex-end;border-bottom:2px solid var(--green);box-shadow:0 2px 6px rgba(0,0,0,.06)}
  .filter-group{display:flex;flex-direction:column;gap:4px}
  .filter-group label{font-size:11px;font-weight:700;color:var(--green);text-transform:uppercase;letter-spacing:.5px}
  .filter-group input,.filter-group select{border:1.5px solid #ccc;border-radius:6px;padding:7px 10px;font-size:13px;min-width:150px;outline:none;transition:border .2s}
  .filter-group input:focus,.filter-group select:focus{border-color:var(--green)}
  .btn{padding:8px 20px;border:none;border-radius:6px;cursor:pointer;font-size:13px;font-weight:600}
  .btn-clear{background:#e0e0e0;color:#555}.btn-clear:hover{background:#c8c8c8}
  .results-info{padding:10px 32px;font-size:13px;color:#666;background:var(--green-bg);border-bottom:1px solid #dce8d9}
  .results-info span{font-weight:700;color:var(--green)}
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(290px,1fr));gap:20px;padding:24px 32px}
  .card{background:white;border-radius:12px;overflow:hidden;box-shadow:var(--shadow);transition:transform .2s,box-shadow .2s;cursor:pointer;border:1.5px solid transparent}
  .card:hover{transform:translateY(-3px);box-shadow:0 6px 20px rgba(59,122,46,.18);border-color:var(--green)}
  .card-img-wrap{width:100%;height:190px;background:#f8f8f8;border-bottom:1px solid #eee;display:flex;align-items:center;justify-content:center;overflow:hidden}
  .card-img{width:100%;height:100%;object-fit:contain;padding:8px;transition:transform .3s}
  .card:hover .card-img{transform:scale(1.04)}
  .card-img-placeholder{color:#bbb;font-size:13px;text-align:center}
  .card-body{padding:14px 16px}
  .card-id{font-size:11px;color:var(--green);font-weight:700;text-transform:uppercase;letter-spacing:.5px}
  .card-title{font-size:14px;font-weight:700;margin:4px 0 8px;line-height:1.3}
  .card-tags{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:8px}
  .tag{font-size:11px;padding:2px 8px;border-radius:20px;font-weight:600}
  .tag-tipo{background:#e8f5e9;color:#2e7d32}.tag-marca{background:#e3f2fd;color:#1565c0}.tag-ubicacion{background:#fff3e0;color:#e65100}
  .card-meta{font-size:12px;color:#777}
  .meta-row{display:flex;justify-content:space-between;margin-top:3px}
  .stock-ok{color:#2e7d32;font-weight:700}.stock-low{color:#e65100;font-weight:700}
  .critico-badge{background:#ffebee;color:#c62828;font-size:10px;font-weight:800;padding:2px 7px;border-radius:10px;margin-left:6px}
  .modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:1000;align-items:center;justify-content:center}
  .modal-overlay.open{display:flex}
  .modal{background:white;border-radius:16px;max-width:700px;width:96%;max-height:93vh;overflow-y:auto;box-shadow:0 8px 40px rgba(0,0,0,.28);animation:fadeIn .18s}
  @keyframes fadeIn{from{opacity:0;transform:scale(.97)}to{opacity:1;transform:scale(1)}}
  .modal-header{background:var(--green);color:white;padding:16px 22px;display:flex;align-items:center;justify-content:space-between;border-radius:16px 16px 0 0;position:sticky;top:0;z-index:10}
  .modal-header h2{font-size:15px;font-weight:700;line-height:1.3}
  .modal-close{background:none;border:none;color:white;font-size:24px;cursor:pointer;line-height:1;padding:0 4px}
  .modal-img-wrap{width:100%;height:300px;background:#f5f5f5;display:flex;align-items:center;justify-content:center;border-bottom:1px solid #eee;overflow:hidden}
  .modal-img{max-width:100%;max-height:100%;object-fit:contain;padding:12px;cursor:zoom-in}
  .modal-img-placeholder{color:#bbb;font-size:15px;text-align:center}
  .modal-body{padding:20px 24px}
  .detail-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px 24px}
  .detail-item{display:flex;flex-direction:column;gap:3px}
  .detail-label{font-size:10px;font-weight:700;color:var(--green);text-transform:uppercase;letter-spacing:.5px}
  .detail-value{font-size:14px;color:var(--text)}
  .detail-full{grid-column:1/-1}
  .section-divider{grid-column:1/-1;border:none;border-top:1.5px solid #eee;margin:4px 0}
  .section-title{grid-column:1/-1;font-size:11px;font-weight:800;color:var(--green);text-transform:uppercase;letter-spacing:1px;margin-top:4px}
  .lightbox{display:none;position:fixed;inset:0;background:rgba(0,0,0,.92);z-index:2000;align-items:center;justify-content:center;cursor:zoom-out}
  .lightbox.open{display:flex}
  .lightbox img{max-width:95vw;max-height:95vh;border-radius:6px}
  .pagination{display:flex;align-items:center;justify-content:center;gap:8px;padding:20px 32px 36px}
  .page-btn{padding:7px 14px;border:1.5px solid #ccc;border-radius:6px;background:white;cursor:pointer;font-size:13px;font-weight:600;transition:all .15s}
  .page-btn:hover{border-color:var(--green);color:var(--green)}
  .page-btn.active{background:var(--green);color:white;border-color:var(--green)}
  .page-btn:disabled{opacity:.4;cursor:default}
  .no-results{text-align:center;padding:60px 32px;color:#999;font-size:15px;grid-column:1/-1}
  .no-results span{font-size:40px;display:block;margin-bottom:10px}
</style>
</head>

const PAGE_SIZE=24;
let filtered=[],currentPage=1;
function populateSelect(id,arr){const s=document.getElementById(id);arr.forEach(v=>{const o=document.createElement('option');o.value=v;o.textContent=v;s.appendChild(o)})}
populateSelect('f-marca',MARCAS);populateSelect('f-tipo',TIPOS);populateSelect('f-ubicacion',UBICACIONES);
function norm(v){return String(v??'').toLowerCase().trim()}
function applyFilters(){
  const iR=norm(document.getElementById('f-idrepuesto').value);
  const fI=norm(document.getElementById('f-id').value);
  const fD=norm(document.getElementById('f-desc').value);
  const fM=norm(document.getElementById('f-marca').value);
  const fT=norm(document.getElementById('f-tipo').value);
  const fU=norm(document.getElementById('f-ubicacion').value);
  filtered=ALL_DATA.filter(r=>{
    if(iR&&!norm(r['IDENTIFICACIÓN DE REPUESTO']).includes(iR))return false;
    if(fI&&!norm(r['ID']).includes(fI))return false;
    if(fD&&!norm(r['DESCRIPCIÓN']).includes(fD)&&!norm(r['Producto']).includes(fD))return false;
    if(fM&&norm(r['MARCA'])!==fM)return false;
    if(fT&&norm(r['GRUPO POR TIPO'])!==fT)return false;
    if(fU&&norm(r['UBICACIÓN'])!==fU)return false;
    return true;
  });
  currentPage=1;render();
}
function clearFilters(){['f-idrepuesto','f-id','f-desc'].forEach(id=>document.getElementById(id).value='');['f-marca','f-tipo','f-ubicacion'].forEach(id=>document.getElementById(id).value='');applyFilters()}
function stockClass(t,m){if(!m||m==='')return'stock-ok';return parseFloat(t)>=parseFloat(m)?'stock-ok':'stock-low'}
function render(){
  const grid=document.getElementById('grid');
  const total=filtered.length;
  const tp=Math.max(1,Math.ceil(total/PAGE_SIZE));
  if(currentPage>tp)currentPage=tp;
  const start=(currentPage-1)*PAGE_SIZE;
  const slice=filtered.slice(start,start+PAGE_SIZE);
  document.getElementById('showing-count').textContent=total;
  document.getElementById('total-count').textContent=ALL_DATA.length;
  document.getElementById('total-badge').textContent=total+' repuestos';
  if(total===0){grid.innerHTML='<div class="no-results"><span>🔍</span>No se encontraron repuestos.</div>';document.getElementById('pagination').innerHTML='';return}
  grid.innerHTML=slice.map((r,i)=>{
    const gi=start+i;
    const img=r['_img_url'];
    const iC=r['REPUESTO CRITICO']==1||r['REPUESTO CRITICO']==='1';
    const sc=stockClass(r['STOCK TOTAL'],r['STOCK MÍNIMO']);
    const ih=img?`<div class="card-img-wrap"><img class="card-img" src="${img}" loading="lazy" onerror="this.parentElement.innerHTML='<div class=\"card-img-placeholder\">📷 Sin imagen</div>'"></div>`:`<div class="card-img-wrap"><div class="card-img-placeholder">📷 Sin imagen</div></div>`;
    return `<div class="card" onclick="openModal(${gi})">${ih}<div class="card-body"><div class="card-id">#${r['IDENTIFICACIÓN DE REPUESTO']||'—'}${r['ID']&&r['ID']!=='nan'?' · '+r['ID']:''}${iC?'<span class="critico-badge">⚠ CRÍTICO</span>':''}</div><div class="card-title">${r['DESCRIPCIÓN']||r['Producto']||'(Sin descripción)'}</div><div class="card-tags">${r['GRUPO POR TIPO']&&r['GRUPO POR TIPO']!=='nan'&&r['GRUPO POR TIPO']!=='None'?`<span class="tag tag-tipo">${r['GRUPO POR TIPO']}</span>`:''}${r['MARCA']&&r['MARCA']!=='NAN'&&r['MARCA']!=='NONE'?`<span class="tag tag-marca">${r['MARCA']}</span>`:''}${r['UBICACIÓN']&&r['UBICACIÓN']!=='nan'&&r['UBICACIÓN']!=='None'?`<span class="tag tag-ubicacion">📍 ${r['UBICACIÓN']}</span>`:''}</div><div class="card-meta"><div class="meta-row"><span>Stock: <b class="${sc}">${r['STOCK TOTAL']??'—'}</b></span><span>Mín: ${r['STOCK MÍNIMO']||'—'}</span></div>${r['COSTO UNITARIO USD']?`<div class="meta-row"><span>USD <b>${Number(r['COSTO UNITARIO USD']).toFixed(2)}</b></span></div>`:''}</div></div></div>`;
  }).join('');
  renderPagination(tp);
}
function renderPagination(tp){
  const pg=document.getElementById('pagination');
  if(tp<=1){pg.innerHTML='';return}
  let h=`<button class="page-btn" onclick="goPage(${currentPage-1})" ${currentPage===1?'disabled':''}>‹</button>`;
  pagRange(currentPage,tp).forEach(p=>{if(p==='...')h+=`<span style="padding:0 6px;color:#aaa">…</span>`;else h+=`<button class="page-btn ${p===currentPage?'active':''}" onclick="goPage(${p})">${p}</button>`});
  h+=`<button class="page-btn" onclick="goPage(${currentPage+1})" ${currentPage===tp?'disabled':''}>›</button>`;
  pg.innerHTML=h;
}
function pagRange(c,t){if(t<=7)return Array.from({length:t},(_,i)=>i+1);const r=[1];if(c>3)r.push('...');for(let i=Math.max(2,c-1);i<=Math.min(t-1,c+1);i++)r.push(i);if(c<t-2)r.push('...');r.push(t);return r}
function goPage(p){const tp=Math.ceil(filtered.length/PAGE_SIZE);if(p<1||p>tp)return;currentPage=p;render();window.scrollTo({top:0,behavior:'smooth'})}
function openModal(idx){
  const r=filtered[idx];
  const iC=r['REPUESTO CRITICO']==1;
  const sc=stockClass(r['STOCK TOTAL'],r['STOCK MÍNIMO']);
  const img=r['_img_url'];
  document.getElementById('modal-title').textContent=(r['DESCRIPCIÓN']||r['Producto']||'Repuesto')+(iC?' ⚠ CRÍTICO':'');
  const ih=img?`<div class="modal-img-wrap"><img class="modal-img" src="${img}" onclick="openLightbox('${img}')" onerror="this.parentElement.innerHTML='<div class=\"modal-img-placeholder\">📷 Sin imagen</div>'"></div>`:`<div class="modal-img-wrap"><div class="modal-img-placeholder">📷 Sin imagen</div></div>`;
  const safe=v=>String(v??'').replace(/</g,'&lt;');
  document.getElementById('modal-content').innerHTML=`${ih}<div class="modal-body"><div class="detail-grid">
    <div class="section-title">Identificación</div>
    <div class="detail-item"><span class="detail-label">ID Repuesto</span><span class="detail-value">${safe(r['IDENTIFICACIÓN DE REPUESTO'])||'—'}</span></div>
    <div class="detail-item"><span class="detail-label">ID</span><span class="detail-value">${r['ID']!=='nan'?safe(r['ID']):'—'}</span></div>
    <div class="detail-item detail-full"><span class="detail-label">Descripción</span><span class="detail-value">${safe(r['DESCRIPCIÓN'])||safe(r['Producto'])||'—'}</span></div>
    ${r['OBSERVACIÓN']?`<div class="detail-item detail-full"><span class="detail-label">Observación</span><span class="detail-value" style="white-space:pre-wrap">${safe(r['OBSERVACIÓN'])}</span></div>`:''}
    <hr class="section-divider"><div class="section-title">Clasificación</div>
    <div class="detail-item"><span class="detail-label">Marca</span><span class="detail-value">${r['MARCA']!=='NAN'&&r['MARCA']!=='NONE'?safe(r['MARCA']):'—'}</span></div>
    <div class="detail-item"><span class="detail-label">Grupo por Tipo</span><span class="detail-value">${r['GRUPO POR TIPO']!=='nan'&&r['GRUPO POR TIPO']!=='None'?safe(r['GRUPO POR TIPO']):'—'}</span></div>
    <div class="detail-item"><span class="detail-label">Grupo por Equipo</span><span class="detail-value">${safe(r['GRUPO POR EQUIPO'])||'—'}</span></div>
    <div class="detail-item"><span class="detail-label">Ubicación</span><span class="detail-value">${r['UBICACIÓN']!=='nan'&&r['UBICACIÓN']!=='None'?'📍 '+safe(r['UBICACIÓN']):'—'}</span></div>
    ${r['UM']||r['MEDIDA']?`<div class="detail-item"><span class="detail-label">UM / Medida</span><span class="detail-value">${safe(r['UM'])} ${safe(r['MEDIDA'])}</span></div>`:''}
    <hr class="section-divider"><div class="section-title">Stock</div>
    <div class="detail-item"><span class="detail-label">Stock Total</span><span class="detail-value ${sc}">${r['STOCK TOTAL']??'—'}</span></div>
    <div class="detail-item"><span class="detail-label">Stock Mínimo</span><span class="detail-value">${r['STOCK MÍNIMO']||'—'}</span></div>
    <div class="detail-item"><span class="detail-label">Stock Máximo</span><span class="detail-value">${r['STOCK MÁXIMO']||'—'}</span></div>
    <div class="detail-item"><span class="detail-label">Camet</span><span class="detail-value">${r['CAMET']||'—'}</span></div>
    <div class="detail-item"><span class="detail-label">Venado Tuerto</span><span class="detail-value">${r['VENADO TUERTO']||'—'}</span></div>
    ${r['COSTO UNITARIO USD']?`<div class="detail-item"><span class="detail-label">Costo Unitario USD</span><span class="detail-value"><b>$ ${Number(r['COSTO UNITARIO USD']).toFixed(2)}</b></span></div>`:''}
    ${r['ALERTA STOCK']?`<div class="detail-item"><span class="detail-label">Alerta Stock</span><span class="detail-value" style="color:#e65100;font-weight:700">${safe(r['ALERTA STOCK'])}</span></div>`:''}
    ${iC?`<div class="detail-item"><span class="detail-label">Repuesto Crítico</span><span class="detail-value" style="color:#c62828;font-weight:700">⚠ Sí</span></div>`:''}
  </div></div>`;
  document.getElementById('modal-overlay').classList.add('open');
  document.body.style.overflow='hidden';
}
function closeModal(e){if(e.target===document.getElementById('modal-overlay'))closeModalDirect()}
function closeModalDirect(){document.getElementById('modal-overlay').classList.remove('open');document.body.style.overflow=''}
function openLightbox(url){document.getElementById('lightbox-img').src=url;document.getElementById('lightbox').classList.add('open')}
function closeLightbox(){document.getElementById('lightbox').classList.remove('open')}
document.addEventListener('keydown',e=>{if(e.key==='Escape'){closeModalDirect();closeLightbox()}});
applyFilters();
</script>
